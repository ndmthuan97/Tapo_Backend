# Tapo — Docker Compose (Backend Only)
# Frontend deploy trên Vercel — không cần container.
#
# Usage (chạy từ thư mục Tapo_Backend/):
#   Chạy cơ bản (nginx + backend + redis):
#     docker compose up -d
#
#   Chạy kèm RabbitMQ:
#     docker compose --profile rabbit up -d
#
#   Build lại image backend:
#     docker compose build --no-cache backend
#
#   Xem logs Nginx:
#     docker compose logs nginx -f
#
# Architecture:
#   Internet → Nginx (:80) → tapo-backend (:8080) → Redis (:6379)
#   Backend KHÔNG expose port ra ngoài — chỉ Nginx public

services:

  # ── Nginx (Reverse Proxy) ──────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: tapo-nginx
    ports:
      - "80:80"
      # Uncomment khi có SSL cert (Let's Encrypt / Cloudflare):
      # - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Uncomment khi có SSL cert:
      # - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - tapo-net

  # ── Backend (Spring Boot) ──────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tapo-backend
    env_file:
      - .env
    environment:
      SERVER_PORT: "8080"
      SPRING_PROFILES_ACTIVE: "${SPRING_PROFILES_ACTIVE:-prod}"
      # Redis — trỏ vào container redis bên dưới
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    # KHÔNG expose port 8080 ra ngoài — chỉ Nginx mới truy cập được
    # Uncomment dòng dưới nếu cần debug trực tiếp (không dùng trong production):
    # ports:
    #   - "8080:8080"
    expose:
      - "8080"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s
    restart: unless-stopped
    networks:
      - tapo-net

  # ── Redis (Cache + Refresh Token Store) ───────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tapo-redis
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD:-}"
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
    # KHÔNG expose port ra ngoài — chỉ backend truy cập trong internal network
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - tapo-net

  # ── RabbitMQ (chỉ bật khi cần — profile rabbit) ───────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: tapo-rabbitmq
    profiles:
      - rabbit
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USER:-tapo}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASSWORD:-tapo-secret}"
      RABBITMQ_DEFAULT_VHOST: "tapo"
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI → http://localhost:15672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - tapo-net

# ── Volumes ────────────────────────────────────────────────────────────────
volumes:
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local

# ── Networks ───────────────────────────────────────────────────────────────
networks:
  tapo-net:
    driver: bridge
