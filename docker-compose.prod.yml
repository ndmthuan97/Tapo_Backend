# ═══════════════════════════════════════════════════════════════════════════════
# docker-compose.prod.yml — Tapo Production Stack (Pull-and-Run)
#
# Người dùng chỉ cần:
#   1. Tạo file .env (copy từ .env.example và điền giá trị thực)
#   2. Chạy: docker compose -f docker-compose.prod.yml up -d
#
# Image được pull từ GHCR — KHÔNG cần source code hay build:
#   ghcr.io/<owner>/tapo-api:latest
#
# Architecture:
#   Internet → Nginx :80 → tapo-api :8080 (internal) → Redis :6379 (internal)
#
# Thay <GITHUB_OWNER> bằng tên GitHub account của bạn:
#   Linux/Mac:  sed -i 's/<GITHUB_OWNER>/ndmthuan97/g' docker-compose.prod.yml
#   Windows:    (Get-Content docker-compose.prod.yml) -replace '<GITHUB_OWNER>','ndmthuan97' | Set-Content docker-compose.prod.yml
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ── Nginx (Reverse Proxy + Rate Limiting + Gzip) ───────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: tapo-nginx
    ports:
      - "80:80"
      # Uncomment khi có SSL cert (Let's Encrypt / Cloudflare):
      # - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Uncomment khi có SSL:
      # - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      tapo-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - tapo-net

  # ── Tapo API (Spring Boot — pulled from GHCR) ─────────────────────────────
  tapo-api:
    # Pull image từ GHCR — không cần build từ source
    # Đổi <GITHUB_OWNER> thành username GitHub (vd: ndmthuan97)
    image: ghcr.io/<GITHUB_OWNER>/tapo-api:latest
    container_name: tapo-api
    pull_policy: always     # luôn pull image mới nhất khi khởi động
    env_file:
      - .env
    environment:
      SERVER_PORT: "8080"
      SPRING_PROFILES_ACTIVE: "prod"
      # Redis nội bộ — trỏ vào container redis bên dưới
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    expose:
      - "8080"   # chỉ expose nội bộ, Nginx sẽ proxy vào
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s   # Spring Boot mất ~60-90s khởi động lần đầu
    restart: unless-stopped
    networks:
      - tapo-net

  # ── Redis (Cache + Refresh Token Store) ───────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tapo-redis
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD:-}"
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
    expose:
      - "6379"   # chỉ expose nội bộ
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - tapo-net

# ── Volumes ────────────────────────────────────────────────────────────────
volumes:
  redis_data:
    driver: local

# ── Networks ───────────────────────────────────────────────────────────────
networks:
  tapo-net:
    driver: bridge
