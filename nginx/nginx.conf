# ═══════════════════════════════════════════════════════════════════════════════
# nginx/nginx.conf — Tapo Backend Reverse Proxy
#
# Vai trò:
#   - Reverse proxy trước Spring Boot :8080
#   - Gzip compression (API JSON response giảm ~70% bandwidth)
#   - Security headers (HSTS, X-Frame-Options, …)
#   - Rate limiting ở HTTP layer (layer 7, trước khi đến Spring/Bucket4j)
#   - WebSocket proxy cho STOMP (/ws endpoint)
#   - Serve Spring Boot Actuator /health (dùng riêng, không public)
#
# Khi deploy self-host: Nginx lắng nghe :80 → proxy → tapo-backend:8080
# Khi dùng Cloudflare/Railway: tắt Nginx, dùng proxy built-in của platform
# ═══════════════════════════════════════════════════════════════════════════════

# ── Worker processes ───────────────────────────────────────────────────────────
worker_processes auto;           # = số CPU cores
worker_rlimit_nofile 65535;      # max open files per worker

events {
    worker_connections 1024;
    multi_accept on;             # nhận nhiều connection trong 1 event loop
    use epoll;                   # Linux kernel I/O event model (tốt nhất cho server)
}

http {
    # ── MIME types ───────────────────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────────
    # json format → dễ parse bởi log aggregation (ELK, Loki, Datadog)
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes_sent":$bytes_sent,'
            '"duration":$request_time,'
            '"upstream":"$upstream_response_time",'
            '"ua":"$http_user_agent"'
        '}';

    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log  warn;

    # ── Performance ────────────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;           # ẩn phiên bản Nginx trong response header

    # ── Gzip Compression ───────────────────────────────────────────────────────────
    # API JSON response giảm ~70% bandwidth — quan trọng cho mobile client
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;           # balance: speed vs compression ratio
    gzip_min_length 1024;        # chỉ compress response >= 1KB
    gzip_types
        application/json
        application/javascript
        text/css
        text/plain
        text/xml
        application/xml
        application/x-javascript
        image/svg+xml;

    # ── Rate Limiting (HTTP Layer) ─────────────────────────────────────────────────
    # Đây là layer 7 rate limit — bổ sung, không thay thế Spring's Bucket4j
    # Bucket4j kiểm soát per-user (JWT), còn Nginx kiểm soát per-IP
    #
    # Zones:
    #   api_general  : 60 req/min mỗi IP cho API calls
    #   api_auth     : 10 req/min mỗi IP cho login/register (chặt hơn — brute force)
    #   api_upload   : 5  req/min mỗi IP cho file upload
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api_upload:10m  rate=5r/m;

    limit_req_status 429;        # trả 429 Too Many Requests khi vượt limit
    limit_conn_zone  $binary_remote_addr zone=addr:10m;

    # ── Upstream (Spring Boot) ─────────────────────────────────────────────────────
    upstream tapo_backend {
        server tapo-backend:8080;
        keepalive 32;            # giữ 32 persistent connections tới Spring Boot
    }

    # ── Main Server Block (HTTP :80) ───────────────────────────────────────────────
    server {
        listen 80;
        server_name _;           # match bất kỳ hostname

        # ── Security Headers ────────────────────────────────────────────────────────
        add_header X-Content-Type-Options   "nosniff"              always;
        add_header X-Frame-Options          "SAMEORIGIN"           always;
        add_header X-XSS-Protection         "1; mode=block"        always;
        add_header Referrer-Policy          "no-referrer-when-downgrade" always;
        add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
        # HSTS: chỉ bật khi có SSL cert (uncomment nếu dùng HTTPS/Cloudflare)
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── Health check endpoint (không log, dùng cho UptimeRobot/Railway health) ──
        location = /actuator/health {
            proxy_pass         http://tapo_backend;
            proxy_set_header   Host $host;
            access_log         off;    # tắt log cho health check (noisy)
        }

        # ── Auth endpoints (rate limit chặt hơn) ──────────────────────────────────
        location ~ ^/api/(auth/login|auth/register|auth/forgot-password) {
            limit_req  zone=api_auth burst=5 nodelay;
            limit_conn addr 10;

            proxy_pass         http://tapo_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── File Upload endpoint (rate limit rất chặt) ─────────────────────────────
        location /api/files {
            limit_req  zone=api_upload burst=2 nodelay;
            client_max_body_size 10m;  # max file size = 10MB

            proxy_pass             http://tapo_backend;
            proxy_http_version     1.1;
            proxy_set_header       Host              $host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header       X-Forwarded-Proto $scheme;
            proxy_request_buffering off;   # stream upload trực tiếp, không buffer vào disk
            proxy_read_timeout     120s;   # upload lớn cần timeout dài hơn
        }

        # ── WebSocket (STOMP over SockJS) ──────────────────────────────────────────
        # Spring WebSocket yêu cầu Connection: Upgrade và Upgrade: websocket header
        location /ws {
            proxy_pass         http://tapo_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "Upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 3600s;    # WS connection tồn tại lâu — cần timeout lớn
            proxy_send_timeout 3600s;
        }

        # ── Swagger UI (chỉ mở trong dev, tắt prod qua Spring profile) ────────────
        location /swagger-ui {
            limit_req zone=api_general burst=20 nodelay;

            proxy_pass       http://tapo_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ── General API ────────────────────────────────────────────────────────────
        location /api {
            limit_req  zone=api_general burst=30 nodelay;
            limit_conn addr 20;

            proxy_pass         http://tapo_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";        # clear để dùng keepalive
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
        }

        # ── Fallback: block unknown paths ──────────────────────────────────────────
        location / {
            return 404 '{"statusCode":404,"message":"Not Found","data":null,"errors":null}';
            add_header Content-Type application/json;
        }
    }
}
