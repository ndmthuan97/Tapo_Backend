spring:
  application:
    name: tapo-backend
  config:
    import: optional:file:.env[.properties]
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

  # ===== SMTP (JavaMailSender) =====
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false

  # ===== REDIS (Upstash TLS) =====
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      ssl:
        enabled: true
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # ===== DATABASE =====
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tapo}?sslmode=require&prepareThreshold=0
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ===== JPA / HIBERNATE =====
  jpa:
    hibernate:
      # create: Tự tạo schema từ entities (dùng lần đầu khi DB trống)
      # Sau khi đã có schema, chuyển lại thành validate và dùng Flyway
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        # Cho phép Hibernate map kiểu UUID sang PostgreSQL uuid natively
        id:
          new_generator_mappings: true

  # ===== FLYWAY MIGRATION =====
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    validate-on-migrate: false

  # ===== SECURITY (OAUTH2) =====
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: email, profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

  # ===== FILE UPLOAD =====
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 25MB

# ===== SERVER =====
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

# ===== JWT =====
jwt:
  secret: ${JWT_SECRET:tapo-secret-key-must-be-at-least-256-bits-long-for-hs256}
  access-token-expiration: 900000       # 15 phút (ms)
  refresh-token-expiration: 604800000   # 7 ngày (ms)

# ===== PAYOS =====
payos:
  client-id: ${PAYOS_CLIENT_ID:your-payos-client-id}
  api-key: ${PAYOS_API_KEY:your-payos-api-key}
  checksum-key: ${PAYOS_CHECKSUM_KEY:your-payos-checksum-key}

# ===== SUPABASE STORAGE =====
supabase:
  url: ${SUPABASE_URL:https://your-project.supabase.co}
  anon-key: ${SUPABASE_ANON_KEY:your-anon-key}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:your-service-role-key}
  bucket: ${SUPABASE_BUCKET:tapo-images}

# ===== SPRINGDOC OPENAPI =====
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    url: /v3/api-docs
    tags-sorter: alpha
    operations-sorter: method
    disable-validator-url: true

# ===== LOGGING =====
logging:
  level:
    backend: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql: WARN
    org.springframework.security: INFO
    org.springframework.security.oauth2: DEBUG
    org.springframework.web: WARN
  file:
    name: ./logs/app.log
  pattern:
    # %X{traceId} -- MDC field from CorrelationIdFilter (java-pro: structured logging)
    console: "%d{HH:mm:ss} [%X{traceId:-no-trace}] %-5level %logger{30} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{traceId:-no-trace}] %-5level %logger{36} - %msg%n"

# ===== APP CONFIG =====
app:
  base-url: ${APP_BASE_URL:http://localhost:5173}
  mail:
    from-name: ${MAIL_FROM_NAME:Tapo Store}

# ===== RABBITMQ (disabled by default — only active on self-host profile) =====
# Prevent Spring Boot from trying to connect to RabbitMQ when not self-hosting.
# RabbitMqConfig uses @Profile("self-host") for the beans; this excludes the autoconfigure.

