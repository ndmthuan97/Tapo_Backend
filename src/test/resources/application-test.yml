# Test profile — H2 in-memory, disable external services
spring:
  datasource:
    url: jdbc:h2:mem:tapo_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
  flyway:
    enabled: false   # Use ddl-auto instead in tests
  data:
    redis:
      host: localhost
      port: 6379

# Disable RabbitMQ auto-connect during tests
spring.rabbitmq.host: localhost

jwt:
  secret: test-secret-key-must-be-at-least-256-bits-long-for-hmac-sha256-ok
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

app:
  base-url: http://localhost:5173
