# ============================================================
# Supabase Keep-Alive
# ============================================================
# Muc dich : Chong pause tren Supabase free tier.
#
# Dac thu Supabase:
#   - Free tier: project bi pause sau 7 NGAY khong co hoat dong.
#   - Ping moi 5 ngay la du -- an toan hon nguong 7 ngay.
#   - Khong can ping thuong xuyen nhu Azure.
#
# Supabase cua Tapo duoc dung cho file storage (anh san pham).
# Endpoint: GET /rest/v1/ voi apikey header.
#
# Secrets can cau hinh (Settings -> Secrets -> Actions):
#   SUPABASE_URL      - vd: https://abcdefgh.supabase.co
#   SUPABASE_ANON_KEY - anon/public key tu Supabase dashboard
# ============================================================

name: "Keep-Alive: Supabase (every 5 days)"

on:
  schedule:
    # Moi 5 ngay luc 02:00 UTC (ngay co dinh: 1, 6, 11, 16, 21, 26 moi thang)
    # Lua chon ngay cu the thay vi */5 de tranh GitHub cron quirks.
    # Khoang cach toi da ~5 ngay -- an toan voi nguong 7 ngay cua Supabase.
    - cron: "0 2 1,6,11,16,21,26 * *"

  workflow_dispatch:
    inputs:
      reason:
        description: "Ly do chay thu cong"
        required: false
        default: "Manual ping"

jobs:
  ping-supabase:
    name: "Ping Supabase /rest/v1/"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: "Validate secrets"
        id: check
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ] || [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "ERROR: SUPABASE_URL or SUPABASE_ANON_KEY is not set."
            echo "  -> Go to: Settings -> Secrets and variables -> Actions -> New repository secret"
            exit 1
          fi
          echo "Secrets OK."

      - name: "Ping Supabase REST API"
        id: ping
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "Time   : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Target : ${SUPABASE_URL}/rest/v1/"
          echo ""

          MAX_RETRIES=3
          RETRY_DELAY=10    # Supabase khoi dong nhanh hon Azure -- 10s la du
          ATTEMPT=0
          HTTP_STATUS=0

          while [ $ATTEMPT -lt $MAX_RETRIES ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt $ATTEMPT/$MAX_RETRIES..."

            HTTP_STATUS=$(curl \
              --silent \
              --output /dev/null \
              --write-out "%{http_code}" \
              --max-time 30 \
              --connect-timeout 10 \
              --header "apikey: ${SUPABASE_ANON_KEY}" \
              --header "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
              --header "Content-Type: application/json" \
              "${SUPABASE_URL}/rest/v1/")

            echo "  HTTP: $HTTP_STATUS"

            # 2xx-4xx = server alive (404 = up but resource not found = OK)
            if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 500 ]; then
              echo "SUPABASE ALIVE (HTTP $HTTP_STATUS, attempt $ATTEMPT)"
              echo "http_status=$HTTP_STATUS" >> "$GITHUB_OUTPUT"
              echo "attempts=$ATTEMPT"         >> "$GITHUB_OUTPUT"
              exit 0
            fi

            [ $ATTEMPT -lt $MAX_RETRIES ] && echo "  Waiting ${RETRY_DELAY}s..." && sleep $RETRY_DELAY
          done

          echo "SUPABASE FAILED after $MAX_RETRIES attempts (HTTP $HTTP_STATUS)"
          echo "http_status=$HTTP_STATUS" >> "$GITHUB_OUTPUT"
          echo "attempts=$ATTEMPT"         >> "$GITHUB_OUTPUT"
          exit 1

      - name: "Job Summary"
        if: always()
        run: |
          SB_STATUS="${{ steps.ping.outputs.http_status }}"
          ATT="${{ steps.ping.outputs.attempts }}"
          RESULT="${{ steps.ping.outcome == 'success' && 'ALIVE' || 'FAILED' }}"

          {
            echo "## Supabase Keep-Alive"
            echo "| Info | Value |"
            echo "|------|-------|"
            echo "| Time | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |"
            echo "| URL | \`SUPABASE_URL/rest/v1/\` |"
            echo "| HTTP | \`${SB_STATUS:-N/A}\` |"
            echo "| Attempts | ${ATT:-N/A}/3 |"
            echo "| Result | **${RESULT}** |"
            if [ -n "${{ github.event.inputs.reason }}" ]; then
              echo "| Reason | ${{ github.event.inputs.reason }} |"
            fi
            echo ""
            echo "> Ping every 5 days to stay under Supabase free tier 7-day pause threshold."
          } >> "$GITHUB_STEP_SUMMARY"
